<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2π/N Invariant Function Plotter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #f8f9fa;
        }
        
        /* Setup Screen Overlay */
        #setup-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(248, 249, 250, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #setup-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        #setup-card h2 { margin-top: 0; }
        #setup-card input {
            font-size: 1.2em;
            width: 80px;
            padding: 5px;
            margin: 10px 0 20px 0;
            text-align: center;
        }
        #setup-card button {
            font-size: 1.1em;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #setup-card button:hover { background: #0056b3; }

        /* Main UI Container */
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            display: none; 
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #e9ecef;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #dee2e6; }
        #draw-btn.active {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        #reset-btn {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }
        #reset-btn:hover { background: #c82333; }
        
        #status {
            font-size: 0.9em;
            color: #666;
            margin-left: 10px;
            min-width: 250px;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas.drawing {
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div id="setup-card">
            <h2>Set Rotational Symmetry</h2>
            <p>Enter the integer value for <strong>N</strong> (minimum 2):</p>
            <input type="number" id="n-input" value="6" min="2" step="1"><br>
            <button id="start-btn">Start Drawing</button>
        </div>
    </div>

    <div id="ui-container">
        <button id="draw-btn">Draw Mode: OFF</button>
        <button id="undo-btn">Undo</button>
        <button id="reset-btn">Clear & Reset</button>
        <span id="status">Ready</span>
    </div>

    <canvas id="mathCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const setupScreen = document.getElementById('setup-screen');
        const uiContainer = document.getElementById('ui-container');
        const nInput = document.getElementById('n-input');
        const startBtn = document.getElementById('start-btn');
        const drawBtn = document.getElementById('draw-btn');
        const undoBtn = document.getElementById('undo-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('status');

        // --- State Management ---
        let width, height;
        let camera = { x: 0, y: 0, zoom: 40 }; // Start zoomed in so coordinates look nice
        let drawMode = false;
        
        let strokes = []; 
        let currentStroke = null;
        let isDrawing = false;
        let dragStartMouse = null; 
        
        // Mathematical Constants
        let N = 6;
        let symAngle = 2 * Math.PI / N;
        
        // Finer discretization for smoother feeling
        const X_RESOLUTION = 0.05; 
        const Y_TOLERANCE = 0.15;  

        let functionMap = new Map();

        // --- Initialization & Resets ---
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        startBtn.addEventListener('click', () => {
            let parsedN = parseInt(nInput.value, 10);
            if (isNaN(parsedN) || parsedN < 2) parsedN = 2;
            N = parsedN;
            nInput.value = N; 
            symAngle = 2 * Math.PI / N;

            setupScreen.style.display = 'none';
            uiContainer.style.display = 'flex';
            statusText.textContent = `N = ${N}. Click and drag to pan. Scroll to zoom.`;
            draw();
        });

        resetBtn.addEventListener('click', () => {
            strokes = [];
            currentStroke = null;
            functionMap.clear();
            camera = { x: 0, y: 0, zoom: 40 };
            drawMode = false;
            updateDrawBtnUI();
            isDrawing = false;
            
            uiContainer.style.display = 'none';
            setupScreen.style.display = 'flex';
            ctx.clearRect(0, 0, width, height);
        });

        function updateDrawBtnUI() {
            drawBtn.textContent = `Draw Mode: ${drawMode ? 'ON' : 'OFF'}`;
            drawBtn.className = drawMode ? 'active' : '';
            canvas.className = drawMode ? 'drawing' : '';
        }

        // --- Coordinate Transformations ---
        function screenToWorld(sx, sy) {
            return {
                x: camera.x + (sx - width / 2) / camera.zoom,
                y: camera.y - (sy - height / 2) / camera.zoom
            };
        }

        function worldToScreen(wx, wy) {
            return {
                x: width / 2 + (wx - camera.x) * camera.zoom,
                y: height / 2 - (wy - camera.y) * camera.zoom
            };
        }

        function rotatePoint(p, angle) {
            return {
                x: p.x * Math.cos(angle) - p.y * Math.sin(angle),
                y: p.x * Math.sin(angle) + p.y * Math.cos(angle)
            };
        }

        // --- Core Logic: Discrete Math & Collision ---
        function getQuantized(v) {
            return Math.round(v / X_RESOLUTION) * X_RESOLUTION;
        }

        function buildFunctionMap() {
            functionMap.clear();
            for (let stroke of strokes) {
                for (let point of stroke) {
                    registerPointInMap(point);
                }
            }
        }

        function registerPointInMap(p) {
            for (let k = 0; k < N; k++) {
                let rotP = rotatePoint(p, k * symAngle);
                let qx = getQuantized(rotP.x);
                functionMap.set(qx, rotP.y);
            }
        }

        function isValidPoint(p) {
            for (let k = 0; k < N; k++) {
                let rotP = rotatePoint(p, k * symAngle);
                let qx = getQuantized(rotP.x);
                
                if (functionMap.has(qx)) {
                    let existingY = functionMap.get(qx);
                    if (Math.abs(existingY - rotP.y) > Y_TOLERANCE) {
                        return false; 
                    }
                }
            }
            return true;
        }

        // Helper to dynamically calculate tick marks based on zoom
        function getTickStep(span, maxTicks) {
            let roughStep = span / maxTicks;
            let p = Math.pow(10, Math.floor(Math.log10(roughStep)));
            let rel = roughStep / p;
            let nice = 1;
            if (rel > 5) nice = 10;
            else if (rel > 2) nice = 5;
            else if (rel > 1) nice = 2;
            return nice * p;
        }

        // --- Event Listeners ---
        drawBtn.addEventListener('click', () => {
            drawMode = !drawMode;
            updateDrawBtnUI();
            statusText.textContent = drawMode ? "Drawing Mode. Try dragging around." : `N = ${N}. Click and drag to pan. Scroll to zoom.`;
        });

        undoBtn.addEventListener('click', () => {
            if (strokes.length > 0) {
                strokes.pop();
                buildFunctionMap();
                draw();
                statusText.textContent = "Undo successful.";
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (setupScreen.style.display !== 'none') return;

            let worldPt = screenToWorld(e.clientX, e.clientY);
            
            if (drawMode) {
                if (!isValidPoint(worldPt)) {
                    statusText.textContent = "Cannot start here: violates function.";
                    return;
                }
                isDrawing = true;
                currentStroke = [worldPt];
                registerPointInMap(worldPt);
                statusText.textContent = "Drawing...";
                draw();
            } else {
                isDrawing = true;
                dragStartMouse = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            if (drawMode) {
                let worldPt = screenToWorld(e.clientX, e.clientY);
                let lastPt = currentStroke[currentStroke.length - 1];
                
                // Calculate how many discrete steps exist between the last valid drawn point and the current mouse position
                let dist = Math.hypot(worldPt.x - lastPt.x, worldPt.y - lastPt.y);
                let steps = Math.max(1, Math.ceil(dist / (X_RESOLUTION / 2)));

                // Walk towards the mouse. Stop (break) if we hit an invalid coordinate boundary.
                for (let i = 1; i <= steps; i++) {
                    let t = i / steps;
                    let testPt = {
                        x: lastPt.x + (worldPt.x - lastPt.x) * t,
                        y: lastPt.y + (worldPt.y - lastPt.y) * t
                    };

                    if (isValidPoint(testPt)) {
                        currentStroke.push(testPt);
                        registerPointInMap(testPt);
                        lastPt = testPt; // Move the drawing head forward
                    } else {
                        // Boundary hit! We break the loop to stop drawing, but we DO NOT freeze the sequence.
                        // As the user keeps moving the mouse, the next mousemove event will try to step 
                        // from this last valid boundary point towards the new mouse position.
                        statusText.textContent = "Boundary hit! Skirting edge...";
                        break; 
                    }
                }
                draw();
            } else {
                let dx = (e.clientX - dragStartMouse.x) / camera.zoom;
                let dy = (e.clientY - dragStartMouse.y) / camera.zoom;
                camera.x = dragStartMouse.camX - dx;
                camera.y = dragStartMouse.camY + dy;
                draw();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (drawMode && isDrawing && currentStroke) {
                strokes.push(currentStroke);
                currentStroke = null;
                statusText.textContent = "Sequence finished.";
            }
            isDrawing = false;
        });

        canvas.addEventListener('wheel', (e) => {
            if (setupScreen.style.display !== 'none') return;
            e.preventDefault();
            const zoomAmount = 0.1;
            if (e.deltaY < 0) camera.zoom *= (1 + zoomAmount);
            else camera.zoom *= (1 - zoomAmount);
            draw();
        });

        // --- Rendering ---
        function draw() {
            if (setupScreen.style.display !== 'none') return;
            ctx.clearRect(0, 0, width, height);

            // Determine dynamic step for approximately 8 ticks on screen
            let worldWidth = width / camera.zoom;
            let worldHeight = height / camera.zoom;
            let stepX = getTickStep(worldWidth, 8);
            let stepY = getTickStep(worldHeight, 8);

            // Calculate grid boundaries
            let startX = Math.floor((camera.x - worldWidth/2) / stepX) * stepX;
            let endX = camera.x + worldWidth/2;
            let startY = Math.floor((camera.y - worldHeight/2) / stepY) * stepY;
            let endY = camera.y + worldHeight/2;

            // Draw Cartesian Grid
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#eaeaea';
            ctx.beginPath();
            
            for (let x = startX; x <= endX; x += stepX) {
                let sx = worldToScreen(x, 0).x;
                ctx.moveTo(sx, 0); ctx.lineTo(sx, height);
            }
            for (let y = startY; y <= endY; y += stepY) {
                let sy = worldToScreen(0, y).y;
                ctx.moveTo(0, sy); ctx.lineTo(width, sy);
            }
            ctx.stroke();

            // Draw Axes
            let origin = worldToScreen(0, 0);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            if (origin.x > 0 && origin.x < width) { ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); }
            if (origin.y > 0 && origin.y < height) { ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); }
            ctx.stroke();

            // Draw Ticks & Labels
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#444';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // X-axis labels
            if (origin.y > 0 && origin.y < height) {
                for (let x = startX; x <= endX; x += stepX) {
                    if (Math.abs(x) < 1e-9) continue; // Skip 0
                    let sx = worldToScreen(x, 0).x;
                    ctx.beginPath();
                    ctx.moveTo(sx, origin.y - 4);
                    ctx.lineTo(sx, origin.y + 4);
                    ctx.stroke();
                    ctx.fillText(Number(x.toPrecision(3)).toString(), sx, origin.y + 8);
                }
            }

            // Y-axis labels
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            if (origin.x > 0 && origin.x < width) {
                for (let y = startY; y <= endY; y += stepY) {
                    if (Math.abs(y) < 1e-9) continue; // Skip 0
                    let sy = worldToScreen(0, y).y;
                    ctx.beginPath();
                    ctx.moveTo(origin.x - 4, sy);
                    ctx.lineTo(origin.x + 4, sy);
                    ctx.stroke();
                    ctx.fillText(Number(y.toPrecision(3)).toString(), origin.x - 8, sy);
                }
            }

            // Draw Strokes and their Rotations
            let allStrokes = currentStroke ? strokes.concat([currentStroke]) : strokes;

            for (let stroke of allStrokes) {
                if (stroke.length === 0) continue;
                for (let k = 0; k < N; k++) {
                    ctx.beginPath();
                    ctx.strokeStyle = (k === 0) ? '#000000' : 'rgba(0, 102, 204, 0.6)';
                    ctx.lineWidth = 2.5; // Slightly thicker lines for visibility
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    for (let i = 0; i < stroke.length; i++) {
                        let pt = rotatePoint(stroke[i], k * symAngle);
                        let sPt = worldToScreen(pt.x, pt.y);
                        if (i === 0) ctx.moveTo(sPt.x, sPt.y);
                        else ctx.lineTo(sPt.x, sPt.y);
                    }
                    ctx.stroke();
                }
            }
        }
    </script>
</body>
</html>
